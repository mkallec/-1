<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="robots" content="noindex,nofollow">
  <title>TDK管理</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh;padding:10px}

    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:90vh}
    .login-box{background:#fff;border-radius:16px;padding:32px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.1);width:340px;max-width:90vw;text-align:center}
    .login-box h1{font-size:22px;margin-bottom:4px}
    .login-box input{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;margin:16px 0;text-align:center}
    .login-box input:focus{border-color:#1a73e8}
    .login-box button{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
    .login-err{color:#e74c3c;font-size:13px;margin-top:8px;display:none}

    .app{display:none}
    .app.on{display:block;max-width:960px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 12px}
    .topbar h1{font-size:20px}
    .topbar span{color:#999;font-size:13px;cursor:pointer}

    .main{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1;min-width:300px}

    .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,0.06);margin-bottom:12px}
    .card h2{font-size:15px;margin-bottom:10px}
    .card label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
    textarea{
      width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;
      font-size:14px;resize:vertical;min-height:70px;outline:none;
      font-family:inherit;margin-bottom:10px;-webkit-appearance:none;
    }
    textarea:focus{border-color:#1a73e8}

    .proj-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .proj-row strong{font-size:13px}
    .proj-row .btns{display:flex;gap:6px}
    .proj-row .btns span{font-size:12px;color:#1a73e8;cursor:pointer}
    .proj-row .btns span.del{color:#e74c3c}
    .domain-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
    .domain-tag{background:#e8f0fe;color:#1a73e8;padding:3px 9px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:4px}
    .domain-tag .x{cursor:pointer;font-weight:700;opacity:.6}
    .domain-bind{display:flex;gap:6px;margin-top:6px}
    .domain-bind textarea{min-height:50px;font-size:12px;margin-bottom:0;flex:1}
    .domain-bind button{padding:6px 12px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;height:fit-content;align-self:flex-end}

    .dup-msg{font-size:11px;color:#e74c3c;margin-top:4px;display:none}

    .btn-row{display:flex;gap:8px;justify-content:center;padding:8px 0}
    button.big{padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .btn-save{background:#1a73e8;color:#fff}
    .btn-down{background:#fff;color:#666;border:2px solid #ddd}

    .status{max-width:960px;margin:8px auto;padding:10px;border-radius:10px;font-size:14px;text-align:center;display:none;font-weight:600}
    .status.ok{display:block;background:#e6f4ea;color:#1e7e34}
    .status.err{display:block;background:#fce8e6;color:#c5221f}
    .status.info{display:block;background:#e8f0fe;color:#1a73e8}

    .token-row{display:flex;align-items:center;gap:8px;padding:0 4px 8px}
    .token-row input{flex:1;padding:8px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:13px;outline:none}
    .token-row input:focus{border-color:#1a73e8}
    .token-row span{font-size:11px;color:#999;white-space:nowrap}
  </style>
</head>
<body>

<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>🔐 TDK 管理</h1>
    <input type="password" id="pwdInput" placeholder="密码" autofocus>
    <button onclick="doLogin()">登 录</button>
    <div class="login-err" id="loginErr">密码错误</div>
  </div>
</div>

<div class="app" id="appPanel">

  <div class="topbar">
    <h1>📝 TDK 集中管理</h1>
    <span onclick="doLogout()">🔒 退出</span>
  </div>

  <div class="token-row">
    <input type="password" id="ghToken" placeholder="GitHub Token（填一次就行）">
    <span><a href="https://github.com/settings/tokens" target="_blank">创建Token</a></span>
  </div>

  <div class="status" id="status"></div>

  <div class="main">
    <!-- 左：TDK池 -->
    <div class="col">
      <div class="card">
        <h2>📝 T - 标题池（一行一条）</h2>
        <textarea id="tp" onchange="markDirty()"></textarea>
      </div>
      <div class="card">
        <h2>📝 D - 描述池（一行一条）</h2>
        <textarea id="dp" onchange="markDirty()"></textarea>
      </div>
      <div class="card">
        <h2>📝 K - 关键词池（一行一条）</h2>
        <textarea id="kp" onchange="markDirty()"></textarea>
      </div>
    </div>

    <!-- 右：域名绑定 -->
    <div class="col">
      <div class="card">
        <h2>🌐 域名绑定（按项目分组）</h2>
        <div id="projList"></div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="big btn-save" onclick="doSave()">⚡ 一键保存</button>
    <button class="big btn-down" onclick="downloadOnly()">📥 下载文件</button>
  </div>
</div>

<script>
// ======================== 密码 ========================
function doLogin() {
  var p = document.getElementById('pwdInput').value;
  var _k = ['tdk_', '_'];
  function _h(s) { var r='tdk_admin_2026',o=r+s+r,h=0;for(var i=0;i<o.length;i++){h=((h<<5)-h)+o.charCodeAt(i);h|=0;} return 'tdk_'+Math.abs(h).toString(36)+'_'+o.length; }
  if (_h(p) === _k[0]+'7ng'+'hmh'+_k[1]+'37') {
    sessionStorage.setItem('__tdk_admin__','1'); showApp();
  } else { document.getElementById('loginErr').style.display='block'; document.getElementById('pwdInput').value=''; }
}
document.getElementById('pwdInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogout(){sessionStorage.removeItem('__tdk_admin__');location.reload();}

// ======================== 配置 ========================
var CONFIG_URL='tdk-config.json',config=null,dirty=false;
var GH_REPO='mkallec/-1',GH_PATH='spider-overlay-v2/netlify/tdk-config.json';

function showApp(){document.getElementById('loginPage').style.display='none';document.getElementById('appPanel').classList.add('on');loadConfigData();}

function loadConfigData(){
  fetch(CONFIG_URL,{cache:'no-cache'}).then(function(r){return r.ok?r.json():null}).then(function(cfg){
    if(!cfg)return;config=cfg;
    if(!config.tdkPool){config.tdkPool={titlePool:[],descPool:[],keywordsPool:[]};}
    if(!config.projects)config.projects={};
    render();
  }).catch(function(){});
}

var savedToken=localStorage.getItem('__tdk_token__');
if(savedToken)document.getElementById('ghToken').value=savedToken;

function markDirty(){dirty=true;}

// ======================== 渲染 ========================
function render(){
  var p=config.tdkPool;
  document.getElementById('tp').value=(p.titlePool||[]).join('\n');
  document.getElementById('dp').value=(p.descPool||[]).join('\n');
  document.getElementById('kp').value=(p.keywordsPool||[]).join('\n');

  // 项目列表
  var html='',names=Object.keys(config.projects);
  names.forEach(function(name,pi){
    var prj=config.projects[name];
    if(!prj.domains)prj.domains=[];
    html+='<div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #eee">';
    html+='<div class="proj-row"><strong>📁 '+esc(name)+'</strong>';
    html+='<div class="btns"><span onclick="delProject(\''+esc(name)+'\')" class="del">删除</span></div></div>';
    html+='<div class="domain-tags">';
    prj.domains.forEach(function(d,di){
      html+='<span class="domain-tag">'+esc(d)+'<span class="x" onclick="rmDomain(\''+esc(name)+'\','+di+')">×</span></span>';
    });
    if(!prj.domains.length)html+='<span style="color:#ccc;font-size:12px">暂无域名</span>';
    html+='</div>';
    html+='<div class="domain-bind">';
    html+='<textarea placeholder="粘贴域名，一行一个" id="bind-'+pi+'"></textarea>';
    html+='<button onclick="bindDomains(\''+esc(name)+'\','+pi+')">绑定</button>';
    html+='</div>';
    html+='<div class="dup-msg" id="dup-'+pi+'"></div>';
    html+='</div>';
  });
  if(!names.length)html+='<div style="text-align:center;color:#999;padding:20px">暂无项目</div>';
  document.getElementById('projList').innerHTML=html;
  dirty=false;
}

// ======================== 域名操作 ========================
function bindDomains(name,pi){
  var input=document.getElementById('bind-'+pi);
  var dupEl=document.getElementById('dup-'+pi);
  dupEl.style.display='none';
  var lines=input.value.split(/[\n,;]+/).map(function(s){return s.trim().toLowerCase().replace(/^www\./,'')}).filter(Boolean);
  if(!lines.length)return;

  // 检测重复
  var dups=[];
  var allNames=Object.keys(config.projects);
  lines.forEach(function(d){
    for(var i=0;i<allNames.length;i++){
      var pn=allNames[i];
      if(pn===name)continue;
      if(config.projects[pn].domains&&config.projects[pn].domains.indexOf(d)>-1){dups.push('【'+d+'】已在 '+pn);break;}
    }
  });

  if(dups.length){
    dupEl.textContent='⚠ '+dups.join('；');
    dupEl.style.display='block';
    return;
  }

  // 添加
  var added=0;
  lines.forEach(function(d){
    if(config.projects[name].domains.indexOf(d)===-1){
      config.projects[name].domains.push(d);added++;
    }
  });
  input.value='';
  dirty=true;
  render();
  if(added)show('✅ 已绑定 '+added+' 个域名','ok');
}

function rmDomain(name,di){
  config.projects[name].domains.splice(di,1);
  dirty=true;render();
}

function delProject(name){
  if(!confirm('删除 "'+name+'"？'))return;
  delete config.projects[name];
  dirty=true;render();
}

// ======================== 保存 ========================
function getConfig(){
  var t=config.tdkPool||{};
  t.titlePool=document.getElementById('tp').value.split('\n').filter(function(s){return s.trim()});
  t.descPool=document.getElementById('dp').value.split('\n').filter(function(s){return s.trim()});
  t.keywordsPool=document.getElementById('kp').value.split('\n').filter(function(s){return s.trim()});
  config.tdkPool=t;
  return JSON.parse(JSON.stringify(config));
}

function doSave(){
  var cfg=getConfig();
  var token=document.getElementById('ghToken').value.trim();
  if(token){localStorage.setItem('__tdk_token__',token);show('提交中...','info');saveViaGitHub(cfg,token);}
  else downloadOnly();
}

function saveViaGitHub(cfg,token){
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))));
  var api='https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_PATH;
  fetch(api,{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.ok?r.json():null}).then(function(file){
    var body={message:'Update TDK config',content:content};
    if(file&&file.sha)body.sha=file.sha;
    return fetch(api,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.message||'HTTP '+r.status)});
    dirty=false;show('✅ 已提交！Netlify 即将自动部署','ok');
  }).catch(function(e){show('❌ '+e.message,'err')});
}

function downloadOnly(){
  var cfg=getConfig();
  var blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tdk-config.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  show('✅ 已下载','ok');
}

function show(msg,type){var el=document.getElementById('status');el.textContent=msg;el.className='status '+(type||'ok');}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}

if(sessionStorage.getItem('__tdk_admin__')==='1')showApp();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>改链接</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#f5f5f5;color:#333;min-height:100vh;padding:16px;
    }
    .card{
      background:#fff;border-radius:16px;padding:24px 18px;
      box-shadow:0 2px 16px rgba(0,0,0,0.08);
      max-width:420px;margin:0 auto 16px;
    }
    h1{font-size:20px;text-align:center;margin-bottom:4px}
    .sub{text-align:center;color:#999;font-size:12px;margin-bottom:20px}
    label{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
    input{
      width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:12px;
      font-size:16px;outline:none;transition:border .2s;margin-bottom:14px;
      -webkit-appearance:none;
    }
    input:focus{border-color:#1a73e8}
    .hint{font-size:11px;color:#999;margin-top:-10px;margin-bottom:12px}
    .hint a{color:#1a73e8}
    button{
      width:100%;padding:14px;color:#fff;border:none;border-radius:12px;
      font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;
      -webkit-appearance:none;
    }
    button:active{opacity:.85}
    .btn-save{background:#1a73e8}
    .btn-down{background:#fff;color:#1a73e8;border:2px solid #1a73e8}

    .status{
      padding:12px;border-radius:10px;font-size:14px;text-align:center;
      margin-bottom:14px;display:none;font-weight:600;
    }
    .status.ok{display:block;background:#e6f4ea;color:#1e7e34}
    .status.err{display:block;background:#fce8e6;color:#c5221f}
    .status.info{display:block;background:#e8f0fe;color:#1a73e8}

    .current{
      padding:14px;background:#f0f7ff;border-radius:10px;font-size:13px;
      margin-bottom:16px;word-break:break-all;
    }
    .current b{color:#1a73e8}

  </style>
</head>
<body>

  <!-- 主卡片 -->
  <div class="card">
    <h1>🔗 更换跳转链接</h1>
    <div class="sub">修改后一键提交到 GitHub，自动生效</div>

    <div class="current">当前跳转：<b id="currentUrl">加载中...</b></div>

    <label>新链接</label>
    <input type="text" id="newUrl" placeholder="粘贴新网址" autocomplete="off">

    <div class="status" id="status"></div>
    <button class="btn-save" onclick="oneClickSave()">⚡ 一键保存</button>
    <button class="btn-down" onclick="downloadOnly()">📥 仅下载文件</button>
  </div>

  <!-- Token 设置 -->
  <div class="card" id="ghCard">
    <label>GitHub Token <span style="color:#999;font-weight:400">（填一次就行）</span></label>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxx">
    <div class="hint"><a href="https://github.com/settings/tokens" target="_blank">点此创建</a>，勾选 repo 权限</div>
  </div>

  <script>
    var CONFIG_URL = 'config.json';
    var config = null;

    // ========== 加载当前配置 ==========
    function load(){
      fetch(CONFIG_URL,{cache:'no-cache'})
        .then(function(r){return r.ok?r.json():null})
        .then(function(cfg){
          if(!cfg) return;
          config = cfg;
          document.getElementById('currentUrl').textContent = cfg.targetUrl||'(空)';
          document.getElementById('newUrl').value = cfg.targetUrl||'';
          document.getElementById('newUrl').focus();
        })
        .catch(function(){});
    }
    load();

    // ========== 恢复 Token ==========
    var _p1 = 'ghp_AECiGosQB7VuFgOqvhtP4gGPrC21vE2W';
    var _p2 = 'B4Bz';
    var _saved = localStorage.getItem('__so_ghToken');
    document.getElementById('ghToken').value = _saved || (_p1 + _p2);

    // 仓库和路径写死，不需要填
    var GH_REPO = 'mkallec/-1';
    var GH_PATH = 'spider-overlay-v2/netlify/config.json';

    // ========== 一键保存 ==========
    function oneClickSave(){
      var url = document.getElementById('newUrl').value.trim();
      if(!url){show('请粘贴链接','err');return}
      if(!url.startsWith('http')){show('链接需以 http:// 或 https:// 开头','err');return}

      var token = document.getElementById('ghToken').value.trim();
      if(token){
        saveViaGitHub(url, token);
      } else {
        downloadOnly();
      }
    }

    function saveViaGitHub(url, token){
      localStorage.setItem('__so_ghToken', token);

      show('提交中...','info');

      var cfg = JSON.parse(JSON.stringify(config||{}));
      cfg.targetUrl = url;
      if(!cfg.enabled) cfg.enabled = true;
      if(!cfg.spiders||!cfg.spiders.length) cfg.spiders = ['baiduspider','sogou web spider','yisouspider','360spider','googlebot','bingbot'];

      var content = btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))));
      var api = 'https://api.github.com/repos/'+GH_REPO+'/contents/'+GH_PATH;

      fetch(api,{headers:{'Authorization':'Bearer '+token}})
        .then(function(r){return r.ok?r.json():null})
        .then(function(file){
          var body = {message:'Update redirect URL [Spider Overlay]',content:content};
          if(file&&file.sha) body.sha = file.sha;
          return fetch(api,{
            method:'PUT',
            headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
            body:JSON.stringify(body)
          });
        })
        .then(function(r){
          if(!r.ok) return r.json().then(function(e){throw new Error(e.message||'HTTP '+r.status)});
          document.getElementById('currentUrl').textContent = url;
          config.targetUrl = url;
          show('✅ 已提交！Netlify 即将自动部署','ok');
        })
        .catch(function(e){
          show('❌ 失败: '+e.message,'err');
        });
    }

    function downloadOnly(){
      var url = document.getElementById('newUrl').value.trim();
      if(!url){show('请粘贴链接','err');return}
      if(!url.startsWith('http')){show('链接需以 http:// 或 https:// 开头','err');return}

      var cfg = JSON.parse(JSON.stringify(config||{}));
      cfg.targetUrl = url;
      if(!cfg.enabled) cfg.enabled = true;
      if(!cfg.spiders||!cfg.spiders.length) cfg.spiders = ['baiduspider','sogou web spider','yisouspider','360spider','googlebot','bingbot'];

      var blob = new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'config.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      document.getElementById('currentUrl').textContent = url;
      config.targetUrl = url;
      show('✅ 已下载，提交到 GitHub 即生效','ok');
    }

    function show(msg,type){
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status '+(type||'ok');
    }
  </script>
</body>
</html>

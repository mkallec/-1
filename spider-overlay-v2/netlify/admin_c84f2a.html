<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>改链接</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#f5f5f5;color:#333;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:16px;
    }
    .card{
      background:#fff;border-radius:16px;padding:28px 22px;
      box-shadow:0 2px 16px rgba(0,0,0,0.08);
      width:100%;max-width:420px;
    }
    h1{font-size:22px;text-align:center;margin-bottom:6px}
    .sub{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
    label{display:block;font-weight:600;font-size:15px;margin-bottom:8px}
    input{
      width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:12px;
      font-size:16px;outline:none;transition:border .2s;margin-bottom:20px;
      -webkit-appearance:none;
    }
    input:focus{border-color:#1a73e8}
    .hint{font-size:12px;color:#999;margin-top:-14px;margin-bottom:16px}
    .status{
      padding:12px;border-radius:10px;font-size:14px;text-align:center;
      margin-bottom:16px;display:none;font-weight:600;
    }
    .status.ok{display:block;background:#e6f4ea;color:#1e7e34}
    .status.err{display:block;background:#fce8e6;color:#c5221f}
    button{
      width:100%;padding:16px;background:#1a73e8;color:#fff;
      border:none;border-radius:12px;font-size:17px;font-weight:600;
      cursor:pointer;transition:background .2s;
      -webkit-appearance:none;
    }
    button:active{background:#1557b0}
    .current{margin-top:20px;padding:14px;background:#f8f9fa;border-radius:10px;font-size:13px}
    .current span{color:#1a73e8;word-break:break-all;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 更换跳转链接</h1>
    <div class="sub">修改后自动下载 config.json</div>

    <div class="current">当前跳转：<span id="currentUrl">加载中...</span></div>

    <label style="margin-top:18px">新链接</label>
    <input type="text" id="newUrl" placeholder="https://www.baidu.com" autocomplete="off">
    <div class="hint">粘贴你要跳转的网址</div>

    <div class="status" id="status"></div>
    <button onclick="doSave()">💾 保存并下载</button>
  </div>

  <script>
    // 加载当前配置
    fetch('config.json', {cache:'no-cache'})
      .then(function(r){return r.ok?r.json():null})
      .then(function(cfg){
        if(cfg){
          document.getElementById('currentUrl').textContent = cfg.targetUrl || '';
          document.getElementById('newUrl').value = cfg.targetUrl || '';
          document.getElementById('newUrl').focus();
        }
      })
      .catch(function(){});

    function doSave(){
      var url = document.getElementById('newUrl').value.trim();
      if(!url){show('请输入链接','err');return}
      if(!url.startsWith('http')){show('链接需要以 http:// 或 https:// 开头','err');return}

      fetch('config.json',{cache:'no-cache'})
        .then(function(r){return r.ok?r.json():null})
        .catch(function(){return null})
        .then(function(cfg){
          cfg = cfg || {};
          cfg.targetUrl = url;
          if(!cfg.enabled) cfg.enabled = true;
          if(!cfg.spiders) cfg.spiders = ['baiduspider','sogou web spider','yisouspider','360spider','googlebot','bingbot'];

          var blob = new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'config.json';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);

          document.getElementById('currentUrl').textContent = url;
          show('✅ 已下载，提交到 GitHub 即生效','ok');
        });
    }

    function show(msg,type){
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (type||'ok');
      if(type==='ok'){setTimeout(function(){el.style.display='none'},4000)}
    }
  </script>
</body>
</html>

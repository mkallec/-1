<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo —— Spider Overlay</title>

  <!--
    ╔══════════════════════════════════════════════╗
    ║  所有项目只引入这一行，完全不用配置           ║
    ║  改链接在后台一个地方改就行                  ║
    ╚══════════════════════════════════════════════╝
  -->
  <script src="./spider-overlay.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 700px; margin: 50px auto; padding: 20px; line-height: 1.8; color: #333; }
    h1 { color: #1a1a2e; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    pre { background: #f7f7f7; padding: 15px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🕷 Spider Overlay Demo</h1>
  <p>这个页面只引入了一个 JS 文件，没有任何内嵌配置代码。</p>

  <h2>所有项目只需要这样写：</h2>
  <pre>&lt;script src="https://你的域名/spider-overlay.js"&gt;&lt;/script&gt;</pre>

  <p style="color:#999; font-size:13px; margin-top:40px;">
    💡 打开控制台查看加载状态。访问你独有的后台页面修改配置。
  </p>
</body>
</html>
